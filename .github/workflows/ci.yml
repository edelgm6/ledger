name: CI

on:
  pull_request:
  workflow_call:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-dummy-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run python manage.py test --exclude-tag=e2e --verbosity=2
