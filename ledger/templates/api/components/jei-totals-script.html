<script>
$(document).ready(function() {
    const FMT = { minimumFractionDigits: 2, maximumFractionDigits: 2 };
    const $form = $('#journal-entry-form');
    const sign = (n) => n > 0 ? "+" : n < 0 ? "-" : "";

    function calculateTotals() {
        let totalDebits = 0;
        let totalCredits = 0;

        $form.find('[name^="debits-"][name$="-amount"]').each(function() {
            totalDebits += parseFloat($(this).val().replace(/,/g, '')) || 0;
        });

        $form.find('[name^="credits-"][name$="-amount"]').each(function() {
            totalCredits += parseFloat($(this).val().replace(/,/g, '')) || 0;
        });

        const delta = totalDebits - totalCredits;

        $('#totalDebits').text(
            totalDebits.toLocaleString('en-US', FMT) +
            ` (${sign(delta)}${Math.abs(delta).toLocaleString('en-US', FMT)})`
        );

        $('#totalCredits').text(
            totalCredits.toLocaleString('en-US', FMT) +
            ` (${sign(-delta)}${Math.abs(delta).toLocaleString('en-US', FMT)})`
        );

        console.log("Debits:", totalDebits, "Credits:", totalCredits);
        console.log("Delta Debits:", delta, "Delta Credits:", -delta);
    }

    $form.on('input', '[name$="-amount"]', calculateTotals);
    calculateTotals();
});
</script>
