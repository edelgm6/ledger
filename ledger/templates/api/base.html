{% load static %}<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Responsive viewport meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <!-- Include jQuery (independent of the removed Bootstrap; powers behavior scripts) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org"></script>

    <!-- Bootstrap Icons (icon font only; framework removed in favor of app.css) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Central design system: the single source of truth for all styling -->
    <link rel="stylesheet" href="{% static 'css/app.css' %}">

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <!-- Typeahead multi-select Alpine component (Option B). Registered once,
         before Alpine inits, so it is available to htmx-swapped filter forms. -->
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('typeaheadMultiselect', () => ({
            open: false,
            query: '',
            options: [],          // [{ value, label, selected }]
            placeholder: 'Select',
            allLabel: 'All',
            init() {
                const sel = this.$refs.native;
                this.placeholder = sel.dataset.placeholder || this.placeholder;
                this.allLabel = sel.dataset.allLabel || this.allLabel;
                this.options = Array.from(sel.options).map(o => ({
                    value: o.value, label: o.text.trim(), selected: o.selected,
                }));
            },
            get typing() { return this.query.trim().length > 0; },
            get matches() {
                const q = this.query.trim().toLowerCase();
                if (!q) return this.options;
                return this.options.filter(o => o.label.toLowerCase().includes(q));
            },
            get selectedOptions() { return this.options.filter(o => o.selected); },
            get restOptions() { return this.matches.filter(o => !o.selected); },
            get count() { return this.selectedOptions.length; },
            get summary() { return this.count ? this.count + ' selected' : this.placeholder; },
            get sectionLabel() { return this.typing ? 'Matches' : this.allLabel; },
            get selectAllLabel() {
                return this.typing ? 'Select all (' + this.matches.length + ')' : 'Select all';
            },
            syncNative() {
                const state = {};
                this.options.forEach(o => { state[o.value] = o.selected; });
                Array.from(this.$refs.native.options).forEach(o => { o.selected = !!state[o.value]; });
            },
            toggle(opt) { opt.selected = !opt.selected; this.syncNative(); },
            selectAll() {
                (this.typing ? this.matches : this.options).forEach(o => { o.selected = true; });
                this.syncNative();
            },
            clearAll() { this.options.forEach(o => { o.selected = false; }); this.syncNative(); },
            openMenu() {
                this.open = true;
                this.$nextTick(() => { if (this.$refs.search) this.$refs.search.focus(); });
            },
            closeMenu() { this.open = false; this.query = ''; },
            toggleMenu() { this.open ? this.closeMenu() : this.openMenu(); },
            escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c =>
                    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
            },
            highlight(label) {
                const q = this.query.trim();
                if (!q) return this.escapeHtml(label);
                const i = label.toLowerCase().indexOf(q.toLowerCase());
                if (i < 0) return this.escapeHtml(label);
                return this.escapeHtml(label.slice(0, i))
                    + '<strong class="ta-mark">' + this.escapeHtml(label.slice(i, i + q.length)) + '</strong>'
                    + this.escapeHtml(label.slice(i + q.length));
            },
        }));

        // Live search + selection state shared by the Settings list fragments
        // (Accounts, Loans, Bill Rules). Rows carry data-search; the desktop
        // <tr data-search> set drives the visible count.
        //
        // Remembers each list's live query so it survives htmx innerHTML swaps
        // (e.g. saving an account re-renders the fragment). Keyed by noun; lives
        // for the page lifetime, so a full reload still starts clean.
        const searchListQueries = {};
        Alpine.data('searchList', (total, noun, selectedId = null) => ({
            q: searchListQueries[noun] || '',
            selectedId: selectedId,
            total: total,
            init() { this.$watch('q', v => { searchListQueries[noun] = v; }); },
            matches(el) { return !this.q.trim() || el.dataset.search.includes(this.q.toLowerCase()); },
            visible() {
                if (!this.q.trim()) return this.total;
                const needle = this.q.toLowerCase();
                return Array.from(this.$root.querySelectorAll('tr[data-search]'))
                    .filter(tr => tr.dataset.search.includes(needle)).length;
            },
            countLabel() {
                return this.q.trim() ? (this.visible() + ' of ' + this.total) : (this.total + ' ' + noun);
            },
        }));
    });
    </script>


    {% block extra_head %}{% endblock %}
</head>

<body>

    {% include "api/components/nav.html" %}
    <div id="container" class="page">
        {% block content %}{% endblock %}
    </div>


</body>
<script>
    document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
</script>

<script>
$(document).on('click', '.nav-item', function() {
    $('.nav-item').removeClass('active'); // Remove 'active' class from all tabs
    $(this).addClass('active'); // Add 'active' class to the clicked tab
});
</script>
{% block extra_js %}{% endblock %}
</html>
