{% if is_initial_load %}
<h2>Payables/Receivables</h2>
{% endif %}

<div id="table-and-form">
    <div class="grid grid-main-side">
        {% if table %}
        <div id="table">
            {{ table }}
        </div>
        {% endif %}
        <div id="form">
            {% if form %}
                {{ form }}
            {% endif %}
        </div>
    </div>
    <div id="balances-table">
        {{ balances_table }}
    </div>
</div>
