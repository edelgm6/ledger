{% load humanize %}
{% if paystub_values %}
<table class="table mb-2" style="background: transparent;">
    <thead>
        <tr>
            <th>Account</th>
            <th class="right">Value</th>
            <th>Type</th>
        </tr>
    </thead>
    <tbody>
        {% for paystub_value in paystub_values %}
        <tr>
            <td class="td-name">{{ paystub_value.account }}</td>
            <td class="right">${{ paystub_value.amount }}</td>
            <td>{{ paystub_value.journal_entry_item_type }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% if show_fill_button %}
<div class="flex justify-end">
    <button
        @click="fillPaystub({{ paystub_id }})"
        x-bind:disabled="!selectedRowId"
        x-bind:class="!selectedRowId ? 'btn btn-secondary btn-sm' : 'btn btn-primary btn-sm'"
        x-bind:title="!selectedRowId ? 'Select a transaction first' : ''"
    >
        Fill Paystub
    </button>
</div>
{% endif %}
{% endif %}
